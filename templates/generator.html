<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - Cyber Password Security Engine</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="cyber-bg"></div>

    <div class="container">
        <h1 class="page-title">PASSWORD GENERATOR</h1>
        <p class="page-subtitle">Generate strong passwords with custom settings.</p>

        <div class="nav-links" style="margin-top:0; margin-bottom:20px;">
            <a href="{{ url_for('index') }}">🏠 Home</a>
            <a href="{{ url_for('history') }}">📜 History</a>
            <a href="{{ url_for('dashboard') }}">📊 Dashboard</a>
            <a href="{{ url_for('policy') }}">⚙ Policy</a>
            <a href="{{ url_for('logout') }}">🚪 Logout</a>
        </div>

        <form method="POST" class="panel-box neon-box">
            <h3>GENERATOR SETTINGS</h3>

            <div class="form-group">
                <label for="length">Password Length</label>
                <input type="number" name="length" id="length" min="6" max="64" value="14" required>
            </div>

            <div class="checkbox-grid">
                <label class="checkbox-item">
                    <input type="checkbox" name="use_upper" checked>
                    Include Uppercase Letters
                </label>

                <label class="checkbox-item">
                    <input type="checkbox" name="use_lower" checked>
                    Include Lowercase Letters
                </label>

                <label class="checkbox-item">
                    <input type="checkbox" name="use_digits" checked>
                    Include Numbers
                </label>

                <label class="checkbox-item">
                    <input type="checkbox" name="use_special" checked>
                    Include Special Characters
                </label>
            </div>

            <button type="submit" class="btn btn-primary mt-20">Generate Password</button>
        </form>

        {% if generated_password %}
        <div class="generated-password-box neon-box">
            <h3>GENERATED PASSWORD</h3>
            <code id="generatedPasswordText">{{ generated_password }}</code>
            <div style="margin-top:15px;">
                <button type="button" class="btn btn-success" id="copyGeneratedPassword">Copy Generated Password</button>
            </div>
        </div>
        {% endif %}
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
